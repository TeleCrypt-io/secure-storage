name: Deploy UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "ui/**"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # The ui build imports the parent library source (../src/*.ts), which
      # depends on the ROOT node_modules (matrix-js-sdk, oidc-client-ts, …).
      # Install both the root and ui dependency trees before building.
      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build
        run: cd ui && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "ui/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
