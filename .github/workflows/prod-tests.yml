name: Production tests (post-deploy)

# Runs the production functional suite + deployed-UI smoke
# (docs/PROD_TESTING_SPEC.md) against REAL telecrypt.io, automatically after
# every successful UI deploy — plus workflow_dispatch for manual runs.
#
# A failing run here is a post-deploy ALERT, not a gate: the deploy already
# published (deploy-ui.yml completed successfully by the time this runs),
# and nothing here rolls it back. Failures must be loud (non-zero exit,
# visible in the Actions tab / notifications), never silently swallowed.
#
# Needs NO secrets — redpill (Part A) is public/credential-less by design,
# and the deployed-UI smoke (Part B) stops before any login form input.
#
# TWO INDEPENDENT JOBS, deliberately not two steps in one job: Part A
# currently has known-failing cases (see BLOCKERS.md — uploads are denied
# for unverified/redpill accounts by telecrypt.io's tier_controller policy;
# the suite runtime-skips those specific cases rather than faking them, but
# a genuinely new Part A regression would still fail the job). Part B (the
# deployed-UI smoke — the blank-page/entrypoints regression catcher) must
# run and report regardless of Part A's outcome, or it would silently never
# execute under GitHub Actions' default per-step `if: success()` chaining.
on:
  workflow_run:
    workflows: ["Deploy UI to GitHub Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  prod-functional:
    # Only run for an actual successful deploy, or an explicit manual trigger.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run production functional suite (Part A — real telecrypt.io via redpill)
        run: npm run test:prod

  deployed-ui-smoke:
    # Independent of prod-functional's outcome — see the note above.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Part B's Playwright is a root devDependency (this suite lives outside
      # ui/, and needs no local build — it hits the already-deployed live
      # site directly).
      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed-UI smoke (Part B — real storage.telecrypt.io)
        run: npm run test:prod:smoke

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-trace
          path: test-results/
          retention-days: 7
