name: Publish to npm

# Publishes @telecrypt-io/storage to the npm registry using npm Trusted
# Publishing (OIDC) with provenance. There is no NODE_AUTH_TOKEN / npm token
# secret anywhere in this workflow — npm exchanges this workflow run's GitHub
# Actions OIDC identity for a short-lived publish credential at publish time,
# which is only possible once a human has registered this repo + this exact
# workflow file as a Trusted Publisher for the package on npmjs.com (see
# RELEASING.md — that one-time setup step cannot be done from CI).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required to mint the OIDC token trusted publishing exchanges for a publish credential
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing support landed in npm CLI 11.5.1; pin to a recent
      # npm explicitly rather than relying on whatever ships with the Node
      # version above.
      - name: Ensure a trusted-publishing-capable npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish (OIDC trusted publishing + provenance)
        run: npm publish --access public --provenance
