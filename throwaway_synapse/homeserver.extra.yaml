# Appended to the generated homeserver.yaml by up.sh.
# THROWAWAY TEST CONFIG ONLY — never use these settings on a real server.
#
# Purpose: effectively disable every rate limiter, so a functional test suite
# can create users and hammer the server without hitting M_LIMIT_EXCEEDED (see
# TRAP 2 in IMPLEMENTATION_PLAN.md).
#
# NOTE: enable_registration/enable_registration_without_verification are
# deliberately NOT set here — Synapse refuses to start with
# "Registration cannot be enabled when OAuth delegation is enabled". Account
# creation goes through MAS now (see matrix_authentication_service block
# appended separately by up.sh, and test/harness/users.ts / ui/test/e2e/testUsers.ts,
# which provision accounts via `mas-cli manage register-user`).

# Media: allow large-ish uploads for file tests. Local media is not purged by
# default (no media_retention lifetimes set), which is what we want for a storage
# product — silent media deletion would corrupt every test.
max_upload_size: 100M

rc_message:
  per_second: 1000
  burst_count: 1000
rc_registration:
  per_second: 1000
  burst_count: 1000
rc_login:
  address: { per_second: 1000, burst_count: 1000 }
  account: { per_second: 1000, burst_count: 1000 }
  failed_attempts: { per_second: 1000, burst_count: 1000 }
rc_joins:
  local: { per_second: 1000, burst_count: 1000 }
  remote: { per_second: 1000, burst_count: 1000 }
rc_invites:
  per_room: { per_second: 1000, burst_count: 1000 }
  per_user: { per_second: 1000, burst_count: 1000 }
rc_3pid_validation: { per_second: 1000, burst_count: 1000 }
